{% extends 'showroom/base.html' %}
{% block title %}Delete Seller{% endblock %}
{% block content %}
<h1>Delete {{ object }}?</h1>
<p>Are you sure you want to delete this seller? This cannot be undone.</p>
<form method="post">
  {% csrf_token %}
  <button type="submit">Yes, delete</button>
  <a href="{% url 'seller-list' %}">Cancel</a>
</form>
{% endblock %}
