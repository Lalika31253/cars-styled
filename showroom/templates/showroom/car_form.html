{% extends 'showroom/base.html' %}
{% block title %}
  {% if object %}Edit Car{% else %}Add Car{% endif %}
{% endblock %}
{% block content %}
<h1>{% if object %}Edit {{ object }}{% else %}Add a Car{% endif %}</h1>
<form method="post">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit">Save</button>
  <a href="{% url 'car-list' %}">Cancel</a>
</form>
{% endblock %}
